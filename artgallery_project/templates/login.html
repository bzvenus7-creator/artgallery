{% extends "base.html" %}
{% block title %}Войти — ArtGallery{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-logo">Art<span>Gallery</span></div>
    <h2>С возвращением</h2>
    <p class="auth-subtitle">Войдите, чтобы загружать и взаимодействовать с работами</p>

    <form method="post" novalidate>
      <div class="form-group">
        <label for="username">Имя пользователя</label>
        <input type="text" id="username" name="username" class="form-control"
               placeholder="Ваш логин"
               required
               value="{{ request.form.get('username', '') }}"
               autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">Пароль</label>
        <input type="password" id="password" name="password" class="form-control"
               placeholder="Ваш пароль"
               required
               autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary"
              style="width:100%; justify-content:center; margin-top:.5rem;">
        Войти
      </button>
    </form>

    <p style="text-align:center; margin-top:1.25rem; font-size:.88rem; color:var(--text-dim);">
      Нет аккаунта? <a href="{{ url_for('register') }}">Зарегистрироваться</a>
    </p>
  </div>
</div>
{% endblock %}
