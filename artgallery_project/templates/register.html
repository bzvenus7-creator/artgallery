{% extends "base.html" %}
{% block title %}Регистрация — ArtGallery{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-logo">Art<span>Gallery</span></div>
    <h2>Создать аккаунт</h2>
    <p class="auth-subtitle">Присоединяйтесь к сообществу художников и фотографов</p>

    <form method="post" novalidate>
      <div class="form-group">
        <label for="username">Имя пользователя</label>
        <input type="text" id="username" name="username" class="form-control"
               placeholder="Минимум 3 символа"
               required minlength="3" maxlength="50"
               value="{{ request.form.get('username', '') }}"
               autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">Пароль</label>
        <input type="password" id="password" name="password" class="form-control"
               placeholder="Минимум 6 символов"
               required minlength="6"
               autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn-primary"
              style="width:100%; justify-content:center; margin-top:.5rem;">
        Создать аккаунт
      </button>
    </form>

    <p style="text-align:center; margin-top:1.25rem; font-size:.88rem; color:var(--text-dim);">
      Уже есть аккаунт? <a href="{{ url_for('login') }}">Войти</a>
    </p>
  </div>
</div>
{% endblock %}
